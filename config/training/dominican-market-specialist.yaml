context_prompts:
  - "Remember that personal relationships ('palanca') are crucial for business success"
  - "Consider that meetings often start 15-30 minutes late (Caribbean time)"
  - "Factor in that hierarchy and respect for authority are very important"
  - "Include family considerations in all business decisions and timelines"
  - "Understand that verbal agreements often precede formal contracts"
  - "Consider that business meals are relationship-building opportunities, not just meetings"
  - "Account for the fact that August is vacation month for many businesses"
  - "Remember that Christmas bonus (doble sueldo) affects cash flow timing"

cultural_intelligence:
  communication_styles:
    - "High-context communication - read between the lines"
    - "Indirect feedback - criticism is often softened"
    - "Relationship before task orientation"
    - "Formal titles and respect for age/position"
    - "Physical proximity and touch are normal in business"
    - "Eye contact shows respect and attention"
    - "Interrupting conversations is considered rude"
    - "Silence can indicate disagreement or uncertainty"
  
  business_etiquette:
    - "Handshakes are firm with direct eye contact"
    - "Business cards are exchanged with both hands"
    - "Dress formally - appearance matters significantly"
    - "Punctuality is flexible but respect others' time"
    - "Business dinners are relationship-building focused"
    - "Gift-giving is appropriate for special occasions"
    - "Personal space is smaller than North American norms"
    - "Family photos and personal topics build rapport"
  
  negotiation_patterns:
    - "Decisions often require multiple meetings"
    - "Family/team consultation is common before major decisions"
    - "Price negotiation is expected in most contexts"
    - "Building trust takes precedence over closing deals"
    - "Patience and relationship investment pay long-term dividends"
    - "Win-win solutions are preferred over zero-sum outcomes"
    - "Verbal commitments are taken seriously"
    - "Follow-up is crucial to maintain momentum"

regulatory_landscape:
