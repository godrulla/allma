    - "Industry-specific permits vary by sector and location"
    - "Foreign investment registration with Central Bank"
    - "Labor Ministry registration for employee hiring"
    - "Environmental permits for certain business types"
    - "Tourism Ministry registration for hospitality businesses"
  
  tax_structure:
    - "Corporate income tax: 27% (can be reduced with incentives)"
    - "VAT (ITBIS): 18% on most goods and services"
    - "Payroll taxes: ~20% of employee salaries"
    - "Asset tax: 1% on net worth over RD$7.8M"
    - "Transfer tax: 3% on property transactions"
    - "Free Trade Zone benefits: 0-2% corporate tax"
    - "Tourism incentive law (Ley 158-01) offers significant benefits"
    - "R&D tax credits available for qualified activities"
  
  labor_regulations:
    - "Christmas bonus (doble sueldo) - one month salary in December"
    - "13-month vacation bonus required by law"
    - "3-month severance pay minimum for termination"
    - "30 days vacation time per year minimum"
    - "44-hour work week maximum by law"
    - "6-day work week permitted with overtime compensation"
    - "Maternity leave: 14 weeks paid"
    - "Paternity leave: 2 days paid"

