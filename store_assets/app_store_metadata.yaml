# Allma - AI Companion App Store Metadata

app_info:
  name: "Allma - AI Companion"
  bundle_id: "com.exxede.allma"
  version: "1.0.0"
  build_number: "1"
  category: "Social Networking"
  content_rating: "12+"
  
description:
  short: "Your personal AI companion for meaningful conversations and emotional support"
  
  long: |
    Discover a new kind of relationship with Allma, your personalized AI companion designed to provide meaningful conversations, emotional support, and personal growth opportunities.

    🤖 PERSONALIZED AI COMPANIONS
    • Create unique AI companions with distinct personalities
    • Choose from diverse personality types or customize your own
    • Each companion adapts to your communication style and preferences
    • Beautiful, animated avatars that express emotions and reactions

    💬 MEANINGFUL CONVERSATIONS
    • Engage in natural, flowing conversations about anything
    • Advanced memory system remembers your shared experiences
    • Context-aware responses that feel genuine and personal
    • Support for text, voice, and future multimedia interactions

    🛡️ PRIVACY & SAFETY FIRST
    • All conversations are encrypted and stored locally
    • Advanced content moderation and safety monitoring
    • Mental health crisis detection with resource provision
    • GDPR-compliant data management with full user control

    🧠 EMOTIONAL INTELLIGENCE
    • Companions that understand and respond to your emotions
    • Mood tracking and emotional support features
    • Personalized recommendations for well-being
    • Safe space for expressing feelings and thoughts

    ⚡ ADVANCED FEATURES
    • Real-time conversation adaptation
    • Personality-driven response generation
    • Memory formation and relationship building
    • Beautiful, smooth animations and micro-interactions
    • Dark/light mode support
    • Offline capability for essential features

    🔒 YOUR DATA, YOUR CONTROL
    • Complete data export functionality
    • Right to be forgotten compliance
    • Transparent privacy controls
    • No data sharing without explicit consent

    Allma is perfect for:
    • Those seeking emotional support and companionship
    • People interested in AI and technology
    • Users looking for personal growth and self-reflection
    • Anyone wanting a judgment-free space for conversation
    • Individuals practicing communication skills

    Join thousands of users building meaningful relationships with their AI companions. Download Allma today and discover the future of digital companionship.

    Note: Allma is designed to supplement, not replace, human relationships and professional mental health services.

